@model Thoitiet.Models.WeatherConfig

<link href="~/Thoitiet/css/weather.css" rel="stylesheet" />

<div class="container-fluid weatherCMS-wrapper">
	<div class="coordinate-container">
		<h3 class="coordinate-title">Quản lý API thời tiết</h3>
		<table class="coordinate-table">
			<thead>
				<tr>
					<th>Kinh độ</th>
					<th>Vĩ độ</th>
					<th width="120">Hành động</th>
				</tr>
			</thead>
			<tbody id="coordinateBody"></tbody>
		</table>
		<button class="btn-add" onclick="addCoordinate()">+ Thêm vị trí</button>
	</div>
	<div class="timezone-container">
		<label class="timezone-label"> GMT / Múi giờ </label>
		<select id="timezone" class="timezone-select"></select>
	</div>

	<div class="weather-section">
		<div class="section-title">Tham số thời tiết theo giờ</div>
		<div class="weather-grid">
			<div class="column" id="hourly-col-1"></div>
			<div class="column" id="hourly-col-2"></div>
			<div class="column" id="hourly-col-3"></div>
			<div class="column" id="hourly-col-4"></div>
		</div>
	</div>
	<div class="weather-section">
		<div class="section-title">Tham số thời tiết hàng ngày</div>
		<div class="weather-grid">
			<div class="column" id="daily-col-1"></div>
			<div class="column" id="daily-col-2"></div>
			<div class="column" id="daily-col-3"></div>
			<div class="column" id="daily-col-4"></div>
		</div>
	</div>
	<div class="weather-section">
		<div class="section-title">Thời tiết hiện tại</div>
		<div class="weather-grid">
			<div class="column" id="current-col-1"></div>
			<div class="column" id="current-col-2"></div>
			<div class="column" id="current-col-3"></div>
			<div class="column" id="current-col-4"></div>
		</div>
	</div>
	<button type="button" onclick="generateUrl()">Lưu và Áp dụng</button>
</div>

@using System.Text.Json

<script>
	const model =
		@Html.Raw(
			JsonSerializer.Serialize(Model)
		);
	const hourly = [
		{ label: "Temperature (2 m)", value: "temperature_2m", checked: true, col: 1 },
		{ label: "Relative Humidity (2 m)", value: "relative_humidity_2m", col: 1 },
		{ label: "Dewpoint (2 m)", value: "dew_point_2m", col: 1 },
		{ label: "Apparent Temperature", value: "apparent_temperature", col: 1 },
		{ label: "Precipitation Probability", value: "precipitation_probability", col: 1 },
		{ label: "Precipitation", value: "precipitation", col: 1 },
		{ label: "Rain", value: "rain", col: 1 },
		{ label: "Showers", value: "showers", col: 1 },
		{ label: "Snowfall", value: "snowfall", col: 1 },
		{ label: "Snow Depth", value: "snow_depth", col: 1 },

		{ label: "Weather code", value: "weather_code", col: 2 },
		{ label: "Sea Level Pressure", value: "pressure_msl", col: 2 },
		{ label: "Surface Pressure", value: "surface_pressure", col: 2 },
		{ label: "Cloud Cover Total", value: "cloud_cover", col: 2 },
		{ label: "Cloud Cover Low", value: "cloud_cover_low", col: 2 },
		{ label: "Cloud Cover Mid", value: "cloud_cover_mid", col: 2 },
		{ label: "Cloud Cover High", value: "cloud_cover_high", col: 2 },
		{ label: "Visibility", value: "visibility", col: 2 },
		{ label: "Evapotranspiration", value: "evapotranspiration", col: 2 },
		{ label: "Reference Evapotranspiration", value: "et0_fao_evapotranspiration", col: 2 },
		{ label: "Vapour Pressure Deficit", value: "vapour_pressure_deficit", col: 2 },

		{ label: "Wind Speed (10 m)", value: "wind_speed_10m", col: 3 },
		{ label: "Wind Speed (80 m)", value: "wind_speed_80m", col: 3 },
		{ label: "Wind Speed (120 m)", value: "wind_speed_120m", col: 3 },
		{ label: "Wind Speed (180 m)", value: "wind_speed_180m", col: 3 },
		{ label: "Wind Direction (10 m)", value: "wind_direction_10m", col: 3 },
		{ label: "Wind Direction (80 m)", value: "wind_direction_80m", col: 3 },
		{ label: "Wind Direction (120 m)", value: "wind_direction_120m", col: 3 },
		{ label: "Wind Direction (180 m)", value: "wind_direction_180m", col: 3 },
		{ label: "Wind Gusts (10 m)", value: "wind_gusts_10m", col: 3 },
		{ label: "Temperature (80 m)", value: "temperature_80m", col: 3 },
		{ label: "Temperature (120 m)", value: "temperature_120m", col: 3 },
		{ label: "Temperature (180 m)", value: "temperature_180m", col: 3 },

		{ label: "Soil Temperature (0 cm)", value: "soil_temperature_0cm", col: 4 },
		{ label: "Soil Temperature (6 cm)", value: "soil_temperature_6cm", col: 4 },
		{ label: "Soil Temperature (18 cm)", value: "soil_temperature_18cm", col: 4 },
		{ label: "Soil Temperature (54 cm)", value: "soil_temperature_54cm", col: 4 },
		{ label: "Soil Moisture (0-1 cm)", value: "soil_moisture_0_to_1cm", col: 4 },
		{ label: "Soil Moisture (1-3 cm)", value: "soil_moisture_1_to_3cm", col: 4 },
		{ label: "Soil Moisture (3-9 cm)", value: "soil_moisture_3_to_9cm", col: 4 },
		{ label: "Soil Moisture (9-27 cm)", value: "soil_moisture_9_to_27cm", col: 4 },
		{ label: "Soil Moisture (27-81 cm)", value: "soil_moisture_27_to_81cm", col: 4 }
	];

	const daily = [

		{ label: "Weather code", value: "weather_code", col: 1 },
		{ label: "Maximum Temperature (2 m)", value: "temperature_2m_max", col: 1 },
		{ label: "Minimum Temperature (2 m)", value: "temperature_2m_min", col: 1 },
		{ label: "Maximum Apparent Temperature", value: "apparent_temperature_max", col: 1 },
		{ label: "Minimum Apparent Temperature", value: "apparent_temperature_min", col: 1 },

		{ label: "Sunrise", value: "sunrise", col: 2 },
		{ label: "Sunset", value: "sunset", col: 2 },
		{ label: "Daylight Duration", value: "daylight_duration", col: 2 },
		{ label: "Sunshine Duration", value: "sunshine_duration", col: 2 },
		{ label: "UV Index", value: "uv_index_max", col: 2 },
		{ label: "UV Index Clear Sky", value: "uv_index_clear_sky_max", col: 2 },

		{ label: "Rain Sum", value: "rain_sum", col: 3 },
		{ label: "Showers Sum", value: "showers_sum", col: 3 },
		{ label: "Snowfall Sum", value: "snowfall_sum", col: 3 },
		{ label: "Precipitation Sum", value: "precipitation_sum", col: 3 },
		{ label: "Precipitation Hours", value: "precipitation_hours", col: 3 },
		{ label: "Precipitation Probability Max", value: "precipitation_probability_max", col: 3 },

		{ label: "Maximum Wind Speed", value: "wind_speed_10m_max", col: 4 },
		{ label: "Maximum Wind Gusts", value: "wind_gusts_10m_max", col: 4 },
		{ label: "Dominant Wind Direction", value: "wind_direction_10m_dominant", col: 4 },
		{ label: "Shortwave Radiation", value: "shortwave_radiation_sum", col: 4 },
		{ label: "Reference Evapotranspiration", value: "et0_fao_evapotranspiration", col: 4 }

	];

	const current = [

		{ label: "Temperature (2 m)", value: "temperature_2m", col: 1 },
		{ label: "Relative Humidity (2 m)", value: "relative_humidity_2m", col: 1 },
		{ label: "Apparent Temperature", value: "apparent_temperature", col: 1 },
		{ label: "Is Day", value: "is_day", col: 1 },

		{ label: "Precipitation", value: "precipitation", col: 2 },
		{ label: "Rain", value: "rain", col: 2 },
		{ label: "Showers", value: "showers", col: 2 },
		{ label: "Snowfall", value: "snowfall", col: 2 },

		{ label: "Weather code", value: "weather_code", col: 3 },
		{ label: "Cloud Cover", value: "cloud_cover", col: 3 },
		{ label: "Sea Level Pressure", value: "pressure_msl", col: 3 },
		{ label: "Surface Pressure", value: "surface_pressure", col: 3 },

		{ label: "Wind Speed (10 m)", value: "wind_speed_10m", col: 4 },
		{ label: "Wind Direction (10 m)", value: "wind_direction_10m", col: 4 },
		{ label: "Wind Gusts (10 m)", value: "wind_gusts_10m", col: 4 }

	];
	const gmtData = [
		{ label: "GMT+0 (UTC)", value: "" },
		{ label: "Automatically detect time zone", value: "auto" },
		{ label: "America/Anchorage", value: "America%2FAnchorage" },
		{ label: "America/Los Angeles", value: "America%2FLos_Angeles" },
		{ label: "America/Denver", value: "America%2FDenver" },
		{ label: "America/Chicago", value: "America%2FChicago" },
		{ label: "America/New York", value: "America%2FNew_York" },
		{ label: "America/Sao Paulo", value: "America%2FSao_Paulo" },
		{ label: "Europe/London", value: "Europe%2FLondon" },
		{ label: "Europe/Berlin", value: "Europe%2FBerlin" },
		{ label: "Europe/Moscow", value: "Europe%2FMoscow" },
		{ label: "Africa/Cairo", value: "Africa%2FCairo" },
		{ label: "Asia/Bangkok", value: "Asia%2FBangkok" },
		{ label: "Asia/Singapore", value: "Asia%2FSingapore" },
		{ label: "Asia/Tokyo", value: "Asia%2FTokyo" },
		{ label: "Australia/Sydney", value: "Australia%2FSydney" },
		{ label: "Pacific/Auckland", value: "Pacific%2FAuckland" },
	]
	const defaultHourly = model?.Hourly ?? [
		"temperature_2m",
	];

	const defaultDaily = model?.Daily ?? [];

	const defaultCurrent = model?.Current ?? [];

	function render(data, prefix, Defaults = []) {

		for (let i = 1; i <= 4; i++) {

			const items =
				data.filter(x => x.col === i);

			let html = '';

			items.forEach(x => {

				html += `

		  <label class="checkbox-item">

			  <input

			  type="checkbox"

			  value="${x.value}"

				${Defaults.includes(x.value)
						? "checked"
						: ""}

			  >

			  ${x.label}

		  </label>

		  `;

			});

			document
				.getElementById(`${prefix}-col-${i}`)
				.innerHTML = html;

		}

	}
	function renderGMT(data) {

		const select =
			document.getElementById("timezone");

		let html = '';

		data.forEach(x => {

			html += `
	  <option
		value="${x.value}"

		${model?.Timezone === x.value
					? 'selected'
					: ''}

	  >

		${x.label}

	  </option>
	`;
		});

		select.innerHTML = html;
	}
	function renderCoordinate() {

		const body =
			document.getElementById("coordinateBody");

		body.innerHTML = '';

		const latitudes =
			model?.Latitude ?? [''];

		const longitudes =
			model?.Longitude ?? [''];

		for (let i = 0; i < latitudes.length; i++) {
			body.insertAdjacentHTML(
				"beforeend",
				`
		<tr>

			<td>
			<input
				max="90"
				min="-90"
				type="number"
				step="any"
				class="coordinate-input latitude"
				value="${+latitudes[i] ?? ''}"
				placeholder="-90 → 90">
			</td>

			<td>
			<input
				max="180"
				min="-180"
				type="number"
				step="any"
				class="coordinate-input longitude"
				value="${+longitudes[i] ?? ''}"
				placeholder="-180 → 180">
			</td>

			<td>

			<button
				class="btn-delete"
				onclick="deleteCoordinate(this)">

				Remove

			</button>

			</td>

		</tr>
		`
			);
		}
	}
	renderCoordinate();
	render(hourly, "hourly", defaultHourly);
	render(daily, "daily", defaultDaily);
	render(current, "current", defaultCurrent);
	renderGMT(gmtData);

	function getSelected(prefix) {
		return [...document.querySelectorAll(`#${prefix}-col-1 input:checked,
	  #${prefix}-col-2 input:checked,
	  #${prefix}-col-3 input:checked,
	  #${prefix}-col-4 input:checked`)]
			.map(x => x.value);
	}
	async function generateUrl() {

		if (!validateCoordinate()) {
			return;
		}

		const latitude = [...document.querySelectorAll(".latitude")]
			.map(x => x.value);

		const longitude = [...document.querySelectorAll(".longitude")]
			.map(x => x.value);

		const daily = getSelected("daily");

		const hourly = getSelected("hourly");

		const current = getSelected("current");

		const timezone = document.getElementById("timezone").value;

		const config = {
			latitude,
			longitude,
			daily,
			hourly,
			current,
			timezone
		};
		const response = await fetch(
			"api/v1/weather/config",
			{
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify(
					config
				)
			},
		);
		if (response.ok) {
			alert("Success");
		} else {
			alert("Fail");
		}
	}
	function addCoordinate() {
		const html = `
	  <tr>
		  <td>
			  <input
			  max="90"
			  min="-90"
			  type="number"
			  step="any"
			  class="coordinate-input latitude"
			  placeholder="-90 → 90">
		  </td>
		  <td>
			  <input
			  max="180"
			  min="-180"
			  type="number"
			  step="any"
			  class="coordinate-input longitude"
			  placeholder="-180 → 180">
		  </td>
		  <td class="td-btn-action">
				<button
				class="btn-delete"
				onclick="deleteCoordinate(this)">
				Remove
			</button>
		</td>
	  </tr>
	`;
		document
			.getElementById("coordinateBody")
			.insertAdjacentHTML("beforeend", html);

	}
	function deleteCoordinate(button) {
		const rows =
			document.querySelectorAll("#coordinateBody tr");
		if (rows.length === 1) {
			alert("Phải có ít nhất 1 tọa độ.");
			return;
		}
		button.closest("tr").remove();
	}
	function validateCoordinate() {
		const latitudes =
			document.querySelectorAll(".latitude");
		const longitudes =
			document.querySelectorAll(".longitude");
		for (let i = 0; i < latitudes.length; i++) {
			const lat =
				latitudes[i].value.trim();
			const lon =
				longitudes[i].value.trim();
			if (!lat || !lon) {
				alert(`Thiếu dữ liệu ở dòng ${i + 1}`);
				return false;
			}
			if (Number(lat) < -90 || Number(lat) > 90) {
				alert(`Latitude dòng ${i + 1} phải nằm trong [-90,90]`);
				return false;
			}
			if (Number(lon) < -180 || Number(lon) > 180) {
				alert(`Longitude dòng ${i + 1} phải nằm trong [-180,180]`);
				return false;
			}
		}
		return true;
	}
</script>
